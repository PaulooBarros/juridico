<svg width="100%" viewBox="0 0 690 310" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo Vetor Jurídico — Opção 4</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logotipo moderno com ícone geométrico abstrato formado por dois triângulos e tipografia sans-serif</desc>
  

  <rect width="680" height="300" style="fill:rgb(26, 23, 20);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <g transform="translate(200, 150)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Geometric mark: two interlocking triangles forming a "V" + upward thrust -->
    <!-- Large outer triangle (pointing up) — oxblood -->
    <polygon points="0,-72 62,36 -62,36" fill="#6E1A1E" style="fill:rgb(110, 26, 30);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Inner cutout triangle (pointing down) — lighter -->
    <polygon points="0,20 42,36 -42,36" fill="#8C2226" style="fill:rgb(140, 34, 38);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Small cap triangle top — cream accent -->
    <polygon points="0,-72 18,-36 -18,-36" fill="#FBFAF6" opacity="0.15" style="fill:rgb(251, 250, 246);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Horizontal base line -->
    <line x1="-62" y1="36" x2="62" y2="36" stroke="#6E1A1E" stroke-width="0" style="fill:rgb(0, 0, 0);stroke:rgb(110, 26, 30);color:rgb(255, 255, 255);stroke-width:0px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- "V" negative space implied by two side lines -->
    <!-- Left facet darker -->
    <polygon points="-62,36 -18,-36 0,-72" fill="#561518" style="fill:rgb(86, 21, 24);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Right facet standard -->
    <polygon points="62,36 18,-36 0,-72" fill="#7E1D21" style="fill:rgb(126, 29, 33);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Center groove -->
    <polygon points="0,-52 12,-28 -12,-28" fill="#FBFAF6" opacity="0.08" style="fill:rgb(251, 250, 246);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.08;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Vertical divider -->
  <line x1="292" y1="88" x2="292" y2="212" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(58, 52, 48);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wordmark — sans-serif, clean, modern -->
  <text x="314" y="139" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="42" font-weight="700" letter-spacing="-0.5" text-anchor="start" style="fill:rgb(251, 250, 246);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, &quot;Helvetica Neue&quot;, sans-serif;font-size:42px;font-weight:700;text-anchor:start;dominant-baseline:auto">VETOR</text>

  <text x="314" y="183" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="42" font-weight="300" letter-spacing="3" text-anchor="start" style="fill:rgb(158, 149, 137);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, &quot;Helvetica Neue&quot;, sans-serif;font-size:42px;font-weight:300;text-anchor:start;dominant-baseline:auto">JURÍDICO</text>

  <!-- Opção label -->
  <text x="314" y="220" font-family="Arial, sans-serif" font-size="11" letter-spacing="0.14em" text-anchor="start" style="fill:rgb(92, 85, 76);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">SISTEMA DE GESTÃO JURÍDICA</text>

</svg>